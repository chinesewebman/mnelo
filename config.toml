# 默认 config. 实战不需要改.
# 优先级: env vars > 此文件 > 代码内默认值
# 改完后, 重启 MCP server (`launchctl kickstart -k gui/$(id -u)/ai.hermes-memory.mcp`)

[main]
timezone = 'local'         # 默认系统本地时区 (BJT)
warm_up_embedder = true    # Memory 启动时加载 embedding 模型到 RAM, 避免首次 recall 冷启动 1s

[embedder]
# 切换 embedding 模型 (model + dim 必须严格匹配 — 错配会让 sqlite-vec insert 失败)
# 中文 (默认): BAAI/bge-small-zh-v1.5, 512d
# 英文: BAAI/bge-small-en-v1.5, 384d
# 多语种 (含日/韩/西/法 等 50+): sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2, 384d
# 提示: 也可通过环境变量覆盖 — HERMES_MEMORY_EMBEDDER_MODEL / HERMES_MEMORY_EMBEDDER_DIM
model = 'BAAI/bge-small-zh-v1.5'
dim = 512
